<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abir Ahammad</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #000;
    --text: #fff;
    --card-bg: rgba(0, 20, 10, 0.55);
    --card-border: rgba(0, 255, 136, 0.35);
    --accent: #00ff88;
    --muted: rgba(255, 255, 255, 0.5);
    --btn-bg: rgba(255, 255, 255, 0.03);
}

body.light {
    --bg: #f2f5f3;
    --text: #10201a;
    --card-bg: rgba(255, 255, 255, 0.75);
    --card-border: rgba(0, 150, 90, 0.35);
    --accent: #00a862;
    --muted: rgba(20, 40, 30, 0.6);
    --btn-bg: rgba(0, 0, 0, 0.03);
}

body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.4s ease, color 0.4s ease;
}

#matrix-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    opacity: 0.35;
}

.container {
    position: relative;
    z-index: 1;
    max-width: 420px;
    margin: 0 auto;
    padding: 15px;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
::-webkit-scrollbar-thumb { background: rgba(0, 255, 136, 0.3); border-radius: 3px; }

.mode-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 5;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
}
.mode-toggle:active { transform: scale(0.9); }

.profile-card {
    margin-top: 60px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 35px 25px;
    text-align: center;
    backdrop-filter: blur(6px);
    box-shadow: 0 0 25px rgba(0, 255, 136, 0.15);
    transition: background 0.4s ease, border 0.4s ease;
}

.avatar {
    width: 100px;
    height: 100px;
    margin: 0 auto 18px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--accent);
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
}
.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.profile-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--accent);
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    margin-bottom: 6px;
}

.profile-tag {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 14px 18px;
    margin-bottom: 14px;
    background: var(--btn-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    color: var(--text);
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    transition: all 0.25s ease;
    animation: glow-pulse 2.6s ease-in-out infinite;
}

.link-btn:nth-child(2) { animation-delay: 0.3s; }
.link-btn:nth-child(3) { animation-delay: 0.6s; }
.link-btn:nth-child(4) { animation-delay: 0.9s; }

@keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 6px rgba(0, 255, 136, 0.15); border-color: var(--card-border); }
    50% { box-shadow: 0 0 18px rgba(0, 255, 136, 0.45); border-color: var(--accent); }
}

.link-btn:hover, .link-btn:active {
    background: rgba(0, 255, 136, 0.12);
    transform: translateY(-2px);
}

.link-icon {
    width: 38px;
    height: 38px;
    flex-shrink: 0;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
}

.icon-insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
.icon-whatsapp { background: #25D366; }
.icon-telegram { background: #229ED9; }
.icon-email { background: #ea4335; }

.footer-note {
    margin-top: 30px;
    text-align: center;
    font-size: 11px;
    color: rgba(0, 255, 136, 0.4);
    letter-spacing: 1px;
}
</style>
</head>

<script>
// ============ MATRIX RAIN (light falling code) ============
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const chars = 'アイウエオカキクケコサシスセソタチツテト0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = [];
for (let i = 0; i < columns; i++) drops[i] = Math.random() * -100;

function isLight() { return document.body.classList.contains('light'); }

function drawMatrix() {
    ctx.fillStyle = isLight() ? 'rgba(242, 245, 243, 0.08)' : 'rgba(0, 0, 0, 0.06)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = isLight() ? 'rgba(0, 150, 90, 0.5)' : 'rgba(0, 255, 136, 0.55)';
    ctx.font = fontSize + 'px monospace';
    for (let i = 0; i < drops.length; i++) {
        if (Math.random() > 0.985) {
            const text = chars.charAt(Math.floor(Math.random() * chars.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        }
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}
setInterval(drawMatrix, 50);
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// ============ DARK / LIGHT MODE ============
const toggle = document.getElementById('modeToggle');
function applyMode(mode) {
    if (mode === 'light') {
        document.body.classList.add('light');
        toggle.textContent = '☀️';
    } else {
        document.body.classList.remove('light');
        toggle.textContent = '🌙';
    }
}
const savedMode = localStorage.getItem('themeMode') || 'dark';
applyMode(savedMode);
toggle.addEventListener('click', () => {
    const newMode = document.body.classList.contains('light') ? 'dark' : 'light';
    applyMode(newMode);
    localStorage.setItem('themeMode', newMode);
});
</script>
